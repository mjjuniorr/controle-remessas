services:
  remessas-web:
    image: controle-remessas-web:hml
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-4173}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
