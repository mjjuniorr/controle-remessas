<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3DH Manaus | Controle de Remessas</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f2f4;
      --panel: #ffffff;
      --ink: #15171b;
      --muted: #68707b;
      --line: #d9dee4;
      --soft: #f7f8fa;
      --black: #050607;
      --graphite: #20242a;
      --graphite-2: #343941;
      --orange: #f58220;
      --orange-dark: #d66b12;
      --cyan: #16c7f3;
      --accent: var(--orange);
      --accent-dark: var(--orange-dark);
      --ok: #168149;
      --warn: #b76512;
      --focus: var(--cyan);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(180deg, rgba(5, 6, 7, 0.14), rgba(241, 242, 244, 0) 260px),
        var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      background: linear-gradient(90deg, var(--black), var(--graphite));
      color: #fff;
      font-size: 13px;
      border-bottom: 3px solid var(--orange);
    }

    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      min-height: 38px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .topbar strong {
      color: #fff;
    }

    .topbar span {
      color: #cfd7df;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      padding: 18px 20px;
      color: #fff;
      background:
        linear-gradient(135deg, var(--black), var(--graphite) 58%, var(--graphite-2));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      box-shadow: 0 16px 34px rgba(5, 6, 7, 0.22);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 28px;
      line-height: 1.15;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand-logo {
      width: 172px;
      min-width: 172px;
      height: 78px;
      border-radius: 8px;
      object-fit: contain;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      color: var(--orange);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .subtitle {
      margin-top: 6px;
      color: #d9dde3;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .shipment,
    .empty,
    dialog {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(29, 38, 51, 0.07);
    }

    .panel {
      padding: 18px;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .panel h2 {
      font-size: 18px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--orange);
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    input[type="file"] {
      padding: 10px 12px;
    }

    input:focus {
      outline: 3px solid rgba(22, 199, 243, 0.18);
      border-color: var(--focus);
    }

    button,
    .link-button {
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 13px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
      white-space: nowrap;
    }

    button.primary {
      min-height: 46px;
      color: #15171b;
      background: var(--accent);
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button.secondary,
    .link-button {
      color: var(--ink);
      border: 1px solid var(--line);
      background: #fff;
    }

    button.secondary:hover,
    .link-button:hover {
      border-color: rgba(245, 130, 32, 0.42);
      background: #fff7ef;
    }

    button.danger {
      color: #8f1820;
      border: 1px solid #f2c3c7;
      background: #fff5f6;
    }

    .message {
      min-height: 40px;
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--muted);
      background: var(--soft);
      line-height: 1.35;
      font-size: 14px;
    }

    .message.error {
      color: #8f1820;
      background: #fff0f1;
    }

    .message.ok {
      color: var(--ok);
      background: #eefaf1;
    }

    .tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .shipments {
      display: grid;
      gap: 12px;
    }

    .tracking-list {
      display: grid;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .tracking-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 62px;
      padding: 0 12px;
      background: #fff;
    }

    .tracking-row:nth-child(even) {
      background: #f5f8fb;
    }

    .tracking-row a {
      color: var(--ink);
      font-size: 14px;
      text-decoration: underline;
      overflow-wrap: anywhere;
      text-decoration-color: var(--orange);
      text-underline-offset: 3px;
    }

    .copy-button {
      width: 34px;
      min-width: 34px;
      min-height: 34px;
      padding: 0;
      color: var(--cyan);
      border: 0;
      background: transparent;
    }

    .shipment {
      padding: 16px;
    }

    .shipment-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .code {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      color: var(--ink);
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .items {
      display: none;
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .shipment.open .items {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--soft);
    }

    td.qty {
      width: 110px;
      font-weight: 700;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    dialog {
      width: min(760px, calc(100% - 28px));
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(23, 32, 51, 0.36);
    }

    .modal-head,
    .modal-body {
      padding: 16px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      font-size: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 800;
      color: var(--warn);
      background: #fff7ed;
    }

    .cyan-line {
      width: 88px;
      height: 3px;
      margin-top: 12px;
      border-radius: 999px;
      background: var(--cyan);
    }

    @media (max-width: 880px) {
      main {
        width: min(100% - 20px, 720px);
        padding: 18px 0;
      }

      .grid,
      .tools,
      .shipment-head {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
        align-items: start;
      }

      .topbar-inner {
        width: min(100% - 20px, 720px);
        align-items: start;
        flex-direction: column;
        padding: 8px 0;
      }

      .brand {
        align-items: start;
        flex-direction: column;
      }

      .brand-logo {
        width: 150px;
        min-width: 150px;
        height: 68px;
      }

      .actions {
        justify-content: start;
      }

    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <strong>3DH Manaus</strong>
      <span>Controle interno de remessas, notas fiscais e itens enviados</span>
    </div>
  </div>

  <main>
    <header>
      <div class="brand">
        <img class="brand-logo" src="assets/logo-3dh-manaus.jpeg" alt="3DH Manaus">
        <div>
          <p class="eyebrow">Casa da Impressora 3D</p>
          <h1>Controle de Remessas</h1>
          <p class="subtitle">Acompanhe rastreios, NF-e e itens enviados com uma visão simples para operação interna.</p>
          <div class="cyan-line" aria-hidden="true"></div>
        </div>
      </div>
      <button class="secondary" id="clearAllButton" type="button">Limpar cadastros</button>
    </header>

    <div class="grid">
      <section class="panel" aria-label="Cadastro de rastreio">
        <h2>Novo rastreio</h2>

        <form id="shipmentForm">
          <label for="trackingCode">
            Número de rastreio
            <input id="trackingCode" name="trackingCode" autocomplete="off" placeholder="LTM-95728114925 ou AA123456789BR" required>
          </label>

          <label for="invoiceFile">
            XML da nota fiscal
            <input id="invoiceFile" name="invoiceFile" type="file" accept=".xml,text/xml,application/xml">
          </label>

          <button class="primary" type="submit">Cadastrar rastreio</button>
        </form>

        <div class="message" id="formMessage" aria-live="polite">Nenhum cadastro enviado ainda.</div>
      </section>

      <div class="stack">
        <section class="panel" aria-label="Rastreios cadastrados">
          <h2>Rastreio</h2>
          <div id="trackingList" class="tracking-list"></div>
        </section>

        <section aria-label="Rastreios cadastrados">
          <div class="tools">
            <label for="itemSearch">
              Localizar item
              <input id="itemSearch" autocomplete="off" placeholder="Digite parte do nome, SKU ou código">
            </label>
            <button class="secondary" id="searchButton" type="button">Localizar</button>
          </div>

          <div id="shipments" class="shipments"></div>
        </section>
      </div>
    </div>
  </main>

  <dialog id="searchDialog">
    <div class="modal-head">
      <h2>Localização do item</h2>
      <button class="secondary" id="closeDialogButton" type="button">Fechar</button>
    </div>
    <div class="modal-body" id="searchResults"></div>
  </dialog>

  <script>
    const storageKey = "simple-shipments-v1";
    const shipmentForm = document.querySelector("#shipmentForm");
    const trackingInput = document.querySelector("#trackingCode");
    const invoiceInput = document.querySelector("#invoiceFile");
    const formMessage = document.querySelector("#formMessage");
    const shipmentsContainer = document.querySelector("#shipments");
    const trackingListContainer = document.querySelector("#trackingList");
    const clearAllButton = document.querySelector("#clearAllButton");
    const itemSearch = document.querySelector("#itemSearch");
    const searchButton = document.querySelector("#searchButton");
    const searchDialog = document.querySelector("#searchDialog");
    const searchResults = document.querySelector("#searchResults");
    const closeDialogButton = document.querySelector("#closeDialogButton");

    let shipments = loadShipments();

    function loadShipments() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function saveShipments() {
      localStorage.setItem(storageKey, JSON.stringify(shipments));
    }

    function normalizeTrackingCode(value) {
      return value.trim().toUpperCase().replace(/\s+/g, "");
    }

    function parseTrackingCode(value) {
      const normalized = normalizeTrackingCode(value);
      const correiosCode = normalized.replace(/[^A-Z0-9]/g, "");

      if (/^[A-Z]{2}\d{9}[A-Z]{2}$/.test(correiosCode)) {
        return {
          carrier: "Correios",
          code: correiosCode,
        };
      }

      const digits = normalized.replace(/^LTM-?/, "").replace(/\D/g, "");

      if (digits.length !== 11) {
        throw new Error("Use um rastreio LATAM como LTM-95728114925 ou Correios como AA123456789BR.");
      }

      return {
        carrier: "LATAM Cargo",
        code: `LTM-${digits}`,
        prefix: digits.slice(0, 3),
        awb: digits.slice(3),
      };
    }

    function buildTrackingUrl(shipment) {
      if (shipment.carrier === "Correios") {
        const url = new URL("https://rastreamento.correios.com.br/app/index.php");
        url.searchParams.set("objetos", shipment.code);
        return url.toString();
      }

      const url = new URL("https://www.latamcargo.com/pt/trackshipment");
      url.searchParams.set("docNumber", shipment.awb);
      url.searchParams.set("docPrefix", shipment.prefix);
      url.searchParams.set("soType", "SO");
      return url.toString();
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Nao foi possivel ler o arquivo da nota fiscal."));
        reader.readAsText(file);
      });
    }

    function getNodeText(parent, tagName) {
      return parent.getElementsByTagName(tagName)[0]?.textContent?.trim() || "";
    }

    function parseInvoiceXml(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const parserError = xml.getElementsByTagName("parsererror")[0];

      if (parserError) {
        throw new Error("O XML da nota fiscal nao parece valido.");
      }

      const invoiceNumber = getNodeText(xml, "nNF") || "Sem numero";
      const issuer = getNodeText(xml, "xNome") || "Emitente nao informado";
      const items = Array.from(xml.getElementsByTagName("det")).map((det, index) => {
        const product = det.getElementsByTagName("prod")[0];

        return {
          line: det.getAttribute("nItem") || String(index + 1),
          code: getNodeText(product, "cProd") || "-",
          description: getNodeText(product, "xProd") || "Item sem descricao",
          quantity: formatQuantity(getNodeText(product, "qCom")),
          unit: getNodeText(product, "uCom") || "UN",
        };
      });

      if (!items.length) {
        throw new Error("Nao encontrei itens no XML. Envie o XML completo da NF-e.");
      }

      return {
        invoiceNumber,
        issuer,
        items,
      };
    }

    function formatQuantity(value) {
      const number = Number(String(value).replace(",", "."));

      if (!Number.isFinite(number)) {
        return value || "0";
      }

      return new Intl.NumberFormat("pt-BR", {
        maximumFractionDigits: 3,
      }).format(number);
    }

    function setMessage(message, type = "") {
      formMessage.className = `message ${type}`.trim();
      formMessage.textContent = message;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;",
      })[char]);
    }

    function renderShipments() {
      renderTrackingList();

      if (!shipments.length) {
        shipmentsContainer.innerHTML = '<div class="empty">Nenhum rastreio cadastrado.</div>';
        return;
      }

      shipmentsContainer.innerHTML = shipments.map((shipment) => `
        <article class="shipment" data-id="${shipment.id}">
          <div class="shipment-head">
            <div>
              <div class="code">${escapeHtml(shipment.code)}</div>
              <div class="meta">
                ${escapeHtml(shipment.carrier || "LATAM Cargo")} · ${renderShipmentMeta(shipment)}<br>
                ${shipment.items.length} item(ns) cadastrado(s) · ${escapeHtml(shipment.createdAt)}
              </div>
            </div>
            <div class="actions">
              <button class="secondary" type="button" data-action="items">Ver itens</button>
              <button class="secondary" type="button" data-action="track">Rastrear</button>
              <button class="danger" type="button" data-action="delete">Excluir</button>
            </div>
          </div>
          <div class="items">
            ${renderItemsTable(shipment.items)}
          </div>
        </article>
      `).join("");
    }

    function renderItemsTable(items) {
      if (!items.length) {
        return '<div class="empty">Este rastreio nao possui XML ou itens vinculados.</div>';
      }

      return `
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Codigo</th>
              <th>Descricao</th>
              <th>Quantidade</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((item) => `
              <tr>
                <td>${escapeHtml(item.line)}</td>
                <td>${escapeHtml(item.code)}</td>
                <td>${escapeHtml(item.description)}</td>
                <td class="qty">${escapeHtml(item.quantity)} ${escapeHtml(item.unit)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderTrackingList() {
      if (!shipments.length) {
        trackingListContainer.innerHTML = '<div class="empty">Nenhum rastreio cadastrado.</div>';
        return;
      }

      trackingListContainer.innerHTML = shipments.map((shipment) => `
        <div class="tracking-row" data-id="${shipment.id}">
          <a href="${buildTrackingUrl(shipment)}" target="_blank" rel="noopener">${escapeHtml(shipment.code)}</a>
          <button class="copy-button" type="button" data-action="copy" aria-label="Copiar ${escapeHtml(shipment.code)}" title="Copiar rastreio">
            <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="8" y="8" width="12" height="12" rx="2"></rect>
              <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
            </svg>
          </button>
        </div>
      `).join("");
    }

    function renderShipmentMeta(shipment) {
      if (shipment.carrier === "Correios") {
        return "Sem XML obrigatório";
      }

      return `NF ${escapeHtml(shipment.invoiceNumber)} · ${escapeHtml(shipment.issuer)}`;
    }

    function renderSearchResults(term) {
      const normalized = term.trim().toLowerCase();

      if (!normalized) {
        searchResults.innerHTML = '<p class="message error">Digite um nome, SKU ou codigo para localizar.</p>';
        searchDialog.showModal();
        return;
      }

      const matches = [];

      shipments.forEach((shipment) => {
        shipment.items.forEach((item) => {
          const content = `${item.code} ${item.description}`.toLowerCase();

          if (content.includes(normalized)) {
            matches.push({ shipment, item });
          }
        });
      });

      if (!matches.length) {
        searchResults.innerHTML = '<p class="message">Nenhum item encontrado nos rastreios cadastrados.</p>';
        searchDialog.showModal();
        return;
      }

      searchResults.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Item localizado</th>
              <th>Quantidade</th>
              <th>Esta no envio</th>
              <th>NF</th>
            </tr>
          </thead>
          <tbody>
            ${matches.map(({ shipment, item }) => `
              <tr>
                <td><strong>${escapeHtml(item.description)}</strong><br>${escapeHtml(item.code)}</td>
                <td class="qty">${escapeHtml(item.quantity)} ${escapeHtml(item.unit)}</td>
                <td><span class="badge">${escapeHtml(shipment.code)}</span></td>
                <td>${escapeHtml(shipment.invoiceNumber)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      searchDialog.showModal();
    }

    shipmentForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage("Lendo nota fiscal...");

      try {
        const tracking = parseTrackingCode(trackingInput.value);
        const file = invoiceInput.files[0];
        let invoice = {
          invoiceNumber: "Sem nota",
          issuer: "Nao informado",
          items: [],
        };

        if (tracking.carrier === "LATAM Cargo" && !file) {
          throw new Error("Selecione o XML da nota fiscal.");
        }

        if (file) {
          const xmlText = await readFileAsText(file);
          invoice = parseInvoiceXml(xmlText);
        }

        const shipment = {
          id: crypto.randomUUID(),
          ...tracking,
          ...invoice,
          fileName: file?.name || "Sem XML",
          createdAt: new Intl.DateTimeFormat("pt-BR", {
            dateStyle: "short",
            timeStyle: "short",
          }).format(new Date()),
        };

        shipments.unshift(shipment);
        saveShipments();
        renderShipments();
        shipmentForm.reset();
        setMessage(`Rastreio cadastrado com ${shipment.items.length} item(ns).`, "ok");
      } catch (error) {
        setMessage(error.message, "error");
      }
    });

    shipmentsContainer.addEventListener("click", (event) => {
      const button = event.target.closest("button");

      if (!button) {
        return;
      }

      const shipmentElement = button.closest(".shipment");
      const shipmentId = shipmentElement?.dataset.id;
      const action = button.dataset.action;

      if (action === "items") {
        shipmentElement.classList.toggle("open");
        button.textContent = shipmentElement.classList.contains("open") ? "Ocultar itens" : "Ver itens";
      }

      if (action === "track") {
        const shipment = shipments.find((item) => item.id === shipmentId);

        if (shipment) {
          window.open(buildTrackingUrl(shipment), "_blank", "noopener");
        }
      }

      if (action === "delete") {
        shipments = shipments.filter((shipment) => shipment.id !== shipmentId);
        saveShipments();
        renderShipments();
      }
    });

    trackingListContainer.addEventListener("click", async (event) => {
      const button = event.target.closest("button");

      if (!button || button.dataset.action !== "copy") {
        return;
      }

      const shipmentId = button.closest(".tracking-row")?.dataset.id;
      const shipment = shipments.find((item) => item.id === shipmentId);

      if (!shipment) {
        return;
      }

      try {
        await navigator.clipboard.writeText(shipment.code);
        setMessage(`Rastreio ${shipment.code} copiado.`, "ok");
      } catch {
        setMessage(`Rastreio para copiar: ${shipment.code}`);
      }
    });

    searchButton.addEventListener("click", () => {
      renderSearchResults(itemSearch.value);
    });

    itemSearch.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        renderSearchResults(itemSearch.value);
      }
    });

    closeDialogButton.addEventListener("click", () => {
      searchDialog.close();
    });

    clearAllButton.addEventListener("click", () => {
      if (!shipments.length) {
        setMessage("Nao ha cadastros para limpar.");
        return;
      }

      shipments = [];
      saveShipments();
      renderShipments();
      setMessage("Cadastros removidos.", "ok");
    });

    renderShipments();
  </script>
</body>
</html>
