services:
  remessas-db:
    image: postgres:16-alpine
    networks:
      - PortainerRede
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-controle_remessas}
      POSTGRES_USER: ${POSTGRES_USER:-controle_remessas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - remessas-db-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  remessas-api:
    image: ghcr.io/mjjuniorr/controle-remessas-api:808f865
    networks:
      - PortainerRede
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-controle_remessas}:${POSTGRES_PASSWORD}@remessas-db:5432/${POSTGRES_DB:-controle_remessas}
      APP_PASSWORD: ${APP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      API_TOKEN: ${API_TOKEN}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  remessas-web:
    image: ghcr.io/mjjuniorr/controle-remessas-web:e7ad780
    networks:
      - PortainerRede
    deploy:
      replicas: ${APP_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=PortainerRede
        - traefik.http.routers.controle_remessas_app.rule=Host(`${APP_HOST:-remessas.3dhmanaus.shop}`)
        - traefik.http.routers.controle_remessas_app.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.controle_remessas_app.tls=true
        - traefik.http.routers.controle_remessas_app.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.routers.controle_remessas_app.priority=${TRAEFIK_PRIORITY:-1}
        - traefik.http.routers.controle_remessas_app.service=controle_remessas_app
        - traefik.http.routers.controle_remessas_app.middlewares=sslheader
        - traefik.http.services.controle_remessas_app.loadbalancer.server.port=80
        - traefik.http.services.controle_remessas_app.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https

networks:
  PortainerRede:
    external: true
    name: PortainerRede

volumes:
  remessas-db-data:
