services:
  remessas-web:
    image: ${APP_IMAGE:?configure APP_IMAGE com a imagem publicada no registry}
    networks:
      - PortainerRede
    deploy:
      replicas: ${APP_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=PortainerRede
        - traefik.http.routers.controle_remessas_app.rule=Host(`${APP_HOST:-remessas.3dhmanaus.shop}`)
        - traefik.http.routers.controle_remessas_app.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
        - traefik.http.routers.controle_remessas_app.tls=true
        - traefik.http.routers.controle_remessas_app.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencryptresolver}
        - traefik.http.routers.controle_remessas_app.priority=${TRAEFIK_PRIORITY:-1}
        - traefik.http.routers.controle_remessas_app.service=controle_remessas_app
        - traefik.http.routers.controle_remessas_app.middlewares=sslheader
        - traefik.http.services.controle_remessas_app.loadbalancer.server.port=80
        - traefik.http.services.controle_remessas_app.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https

networks:
  PortainerRede:
    external: true
    name: PortainerRede
